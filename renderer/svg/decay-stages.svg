  <rect x="336" y="56" width="16" height="16" fill="#4a3218"/>
  <rect x="354" y="56" width="16" height="16" class="n3"/>

  <!-- Row 3 — edge noise, centre clear -->
  <rect x="228" y="74" width="16" height="16" class="n1"/>
  <rect x="246" y="74" width="16" height="16" fill="#4a3218"/>
  <rect x="264" y="74" width="16" height="16" fill="#8a5a28"/>
  <rect x="282" y="74" width="16" height="16" fill="#8a5a28"/>
  <rect x="300" y="74" width="16" height="16" fill="#8a5a28"/>
  <rect x="318" y="74" width="16" height="16" fill="#8a5a28"/>
  <rect x="336" y="74" width="16" height="16" fill="#4a3218"/>
  <rect x="354" y="74" width="16" height="16" class="n2"/>

  <!-- Row 4 — all noise -->
  <rect x="228" y="92" width="16" height="16" class="n3"/>
  <rect x="246" y="92" width="16" height="16" class="n1"/>
  <rect x="264" y="92" width="16" height="16" class="n2"/>
  <rect x="282" y="92" width="16" height="16" class="n3"/>
  <rect x="300" y="92" width="16" height="16" fill="#4a3218"/>
  <rect x="318" y="92" width="16" height="16" class="n1"/>
  <rect x="336" y="92" width="16" height="16" class="n2"/>
  <rect x="354" y="92" width="16" height="16" class="n3"/>

  <text x="300" y="135" class="lbl">DECAYING</text>
  <text x="300" y="148" class="sub-lbl">30 – 70%</text>

  <!-- Arrow 2 -->
  <line x1="387" y1="64" x2="396" y2="64" stroke="#3a3733" stroke-width="1.5"/>
  <polygon points="393,60 399,64 393,68" class="arr"/>

  <!-- ═══════════════════════════════════════
       PANEL 3 — DISSOLVED  (x=402)
       All noise, only 4 center ghost cells remain
  ═══════════════════════════════════════ -->
  <rect x="402" y="8" width="168" height="112" rx="6" fill="#18160f"/>

  <!-- Row 0 — all noise -->
  <rect x="414" y="20" width="16" height="16" class="n1"/>
  <rect x="432" y="20" width="16" height="16" class="n3"/>
  <rect x="450" y="20" width="16" height="16" class="n2"/>
