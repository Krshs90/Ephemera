  <!-- Row 3 — noise + 2 ghost cells -->
  <rect x="414" y="74" width="16" height="16" class="n1"/>
  <rect x="432" y="74" width="16" height="16" class="n3"/>
  <rect x="450" y="74" width="16" height="16" class="n2"/>
  <rect x="468" y="74" width="16" height="16" class="gh"/>
  <rect x="486" y="74" width="16" height="16" class="gh"/>
