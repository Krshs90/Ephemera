  <!-- Row 1 — all noise -->
  <rect x="414" y="38" width="16" height="16" class="n2"/>
  <rect x="432" y="38" width="16" height="16" class="n1"/>
  <rect x="450" y="38" width="16" height="16" class="n3"/>
