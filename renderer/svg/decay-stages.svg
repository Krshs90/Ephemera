<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 155" role="img" aria-label="Diagram showing three stages: Fresh pixel grid, Decaying grid with noise, Dissolved grid of static">

  <style>
    .lbl {
      font-family: 'Archivo Narrow', 'Arial Narrow', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.22em;
      fill: #6a6560;
      text-anchor: middle;
    }
    .sub-lbl {
      font-family: 'Azeret Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.08em;
      fill: #45423f;
      text-anchor: middle;
    }
    .arr { fill: #3a3733; }

    /* Noise flicker animations — three offsets so cells don't all sync */
    .n1 { animation: nf1 0.11s steps(1) infinite; }
    .n2 { animation: nf2 0.17s steps(1) infinite; }
    .n3 { animation: nf3 0.23s steps(1) infinite; }

    @keyframes nf1 {
      0%   { fill: #28261f; }
      30%  { fill: #3e3c39; }
      60%  { fill: #201e1a; }
      100% { fill: #28261f; }
    }
    @keyframes nf2 {
      0%   { fill: #3e3c39; }
      40%  { fill: #1e1c18; }
      70%  { fill: #4e4b47; }
      100% { fill: #3e3c39; }
    }
    @keyframes nf3 {
      0%   { fill: #1e1c18; }
      50%  { fill: #4e4b47; }
      100% { fill: #1e1c18; }
    }

    /* Ghost cells: colour bleeds between two dim states */
    .gh {
      animation: ghostpulse 2.6s ease-in-out infinite alternate;
    }
    @keyframes ghostpulse {
      from { fill: #4a3010; }
      to   { fill: #201510; }
    }
  </style>

  <!-- ═══════════════════════════════════════
       PANEL 1 — FRESH  (x=30)
       8 cols × 5 rows, cell 16×16, step 18
  ═══════════════════════════════════════ -->
  <rect x="30" y="8" width="168" height="112" rx="6" fill="#18160f"/>

  <!-- Row 0 -->
  <rect x="42" y="20" width="16" height="16" fill="#1d1912"/>
  <rect x="60" y="20" width="16" height="16" fill="#1d1912"/>
  <rect x="78" y="20" width="16" height="16" fill="#1d1912"/>
  <rect x="96" y="20" width="16" height="16" fill="#1d1912"/>
  <rect x="114" y="20" width="16" height="16" fill="#1d1912"/>
  <rect x="132" y="20" width="16" height="16" fill="#1d1912"/>
  <rect x="150" y="20" width="16" height="16" fill="#1d1912"/>
  <rect x="168" y="20" width="16" height="16" fill="#1d1912"/>

  <!-- Row 1 -->
  <rect x="42" y="38" width="16" height="16" fill="#1d1912"/>
  <rect x="60" y="38" width="16" height="16" fill="#1d1912"/>
  <rect x="78" y="38" width="16" height="16" fill="#4a3218"/>
  <rect x="96" y="38" width="16" height="16" fill="#4a3218"/>
  <rect x="114" y="38" width="16" height="16" fill="#4a3218"/>
  <rect x="132" y="38" width="16" height="16" fill="#4a3218"/>
  <rect x="150" y="38" width="16" height="16" fill="#1d1912"/>
  <rect x="168" y="38" width="16" height="16" fill="#1d1912"/>

  <!-- Row 2 -->
  <rect x="42" y="56" width="16" height="16" fill="#1d1912"/>
  <rect x="60" y="56" width="16" height="16" fill="#4a3218"/>
  <rect x="78" y="56" width="16" height="16" fill="#4a3218"/>
  <rect x="96" y="56" width="16" height="16" fill="#8a5a28"/>
  <rect x="114" y="56" width="16" height="16" fill="#8a5a28"/>
  <rect x="132" y="56" width="16" height="16" fill="#4a3218"/>
  <rect x="150" y="56" width="16" height="16" fill="#4a3218"/>
  <rect x="168" y="56" width="16" height="16" fill="#1d1912"/>

  <!-- Row 3 -->
