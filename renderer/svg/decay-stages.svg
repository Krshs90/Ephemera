  <rect x="78" y="74" width="16" height="16" fill="#8a5a28"/>
  <rect x="96" y="74" width="16" height="16" fill="#8a5a28"/>
  <rect x="114" y="74" width="16" height="16" fill="#8a5a28"/>
  <rect x="132" y="74" width="16" height="16" fill="#8a5a28"/>
  <rect x="150" y="74" width="16" height="16" fill="#4a3218"/>
  <rect x="168" y="74" width="16" height="16" fill="#1d1912"/>

  <!-- Row 4 -->
  <rect x="42" y="92" width="16" height="16" fill="#1d1912"/>
  <rect x="60" y="92" width="16" height="16" fill="#1d1912"/>
  <rect x="78" y="92" width="16" height="16" fill="#4a3218"/>
  <rect x="96" y="92" width="16" height="16" fill="#4a3218"/>
  <rect x="114" y="92" width="16" height="16" fill="#4a3218"/>
  <rect x="132" y="92" width="16" height="16" fill="#4a3218"/>
  <rect x="150" y="92" width="16" height="16" fill="#1d1912"/>
  <rect x="168" y="92" width="16" height="16" fill="#1d1912"/>

  <text x="114" y="135" class="lbl">FRESH</text>
  <text x="114" y="148" class="sub-lbl">0 – 30%</text>

  <!-- Arrow 1 -->
  <line x1="201" y1="64" x2="210" y2="64" stroke="#3a3733" stroke-width="1.5"/>
  <polygon points="207,60 213,64 207,68" class="arr"/>

  <!-- ═══════════════════════════════════════
       PANEL 2 — DECAYING  (x=216)
       Edges noisy, center still clear
  ═══════════════════════════════════════ -->
  <rect x="216" y="8" width="168" height="112" rx="6" fill="#18160f"/>

  <!-- Row 0 — all noise -->
  <rect x="228" y="20" width="16" height="16" class="n1"/>
  <rect x="246" y="20" width="16" height="16" class="n2"/>
  <rect x="264" y="20" width="16" height="16" class="n3"/>
  <rect x="282" y="20" width="16" height="16" class="n1"/>
  <rect x="300" y="20" width="16" height="16" class="n2"/>
  <rect x="318" y="20" width="16" height="16" class="n3"/>
  <rect x="336" y="20" width="16" height="16" class="n1"/>
  <rect x="354" y="20" width="16" height="16" class="n2"/>

  <!-- Row 1 — edge noise, centre clear -->
  <rect x="228" y="38" width="16" height="16" class="n3"/>
  <rect x="246" y="38" width="16" height="16" class="n1"/>
  <rect x="264" y="38" width="16" height="16" fill="#4a3218"/>
  <rect x="282" y="38" width="16" height="16" fill="#4a3218"/>
  <rect x="300" y="38" width="16" height="16" fill="#4a3218"/>
