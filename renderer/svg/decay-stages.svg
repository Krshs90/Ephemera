  <rect x="432" y="92" width="16" height="16" class="n1"/>
  <rect x="450" y="92" width="16" height="16" class="n3"/>
  <rect x="468" y="92" width="16" height="16" class="n2"/>
  <rect x="486" y="92" width="16" height="16" class="n1"/>
